name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test:all
      - name: Validate RBS syntax
        run: bundle exec rbs -I sig validate

  external-gems:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Install test dependencies for gems
        run: gem install rspec webmock rainbow rack-test
      - name: Clone gem sources
        run: |
          mkdir -p gem_tests
          cd gem_tests
          git clone --depth 1 https://github.com/sinatra/sinatra
          git clone --depth 1 https://github.com/rubocop/rubocop
      - name: Run gem integration tests
        run: bundle exec rake test:gems
